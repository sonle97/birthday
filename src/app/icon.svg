<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Cake base -->
  <rect x="7" y="18" width="18" height="8" rx="2" fill="#f0c456"/>
  <!-- Cake top layer -->
  <rect x="9" y="14" width="14" height="5" rx="1.5" fill="#fb7185"/>
  <!-- Frosting drips -->
  <circle cx="11" cy="18" r="1.2" fill="#fecdd3"/>
  <circle cx="16" cy="19" r="1.2" fill="#fecdd3"/>
  <circle cx="21" cy="18" r="1.2" fill="#fecdd3"/>
  <!-- Candle -->
  <rect x="15" y="8" width="2" height="6" rx="1" fill="#8b5cf6"/>
  <!-- Flame -->
  <ellipse cx="16" cy="7" rx="1.5" ry="2.2" fill="#fde68a"/>
  <ellipse cx="16" cy="7.2" rx="0.8" ry="1.3" fill="#fb923c"/>
</svg>
